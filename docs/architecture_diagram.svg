<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080">
  <defs>
    <pattern id="grid" width="80" height="80" patternUnits="userSpaceOnUse">
      <path d="M 80 0 L 0 0 0 80" fill="none" stroke="#1a1a2e" stroke-opacity="0.25" stroke-width="1"/>
    </pattern>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowStrong">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1920" height="1080" fill="#0a0a14"/>
  <rect width="1920" height="1080" fill="url(#grid)"/>

  <!-- Header -->
  <rect x="0" y="0" width="1920" height="80" fill="#0d0d1a" stroke="#1a1a2e" stroke-width="1"/>
  <text x="60" y="48" font-family="Courier New, monospace" font-size="28" fill="#00ff88" filter="url(#glow)">3-SIGNAL ENSEMBLE</text>
  <text x="60" y="68" font-family="Courier New, monospace" font-size="11" fill="#44bbff" opacity="0.5">SECTION 04 // PARALLEL SIGNAL PROCESSING PIPELINE</text>
  <text x="1800" y="48" text-anchor="end" font-family="Courier New, monospace" font-size="11" fill="#00ff88" opacity="0.4">PARALLEL PIPELINE</text>

  <!-- ===== THREE COLUMNS - each 300px wide, 40px gaps ===== -->

  <!-- SIGNAL 1: LEXICON (x:60-360) -->
  <g transform="translate(60, 110)">
    <rect x="0" y="0" width="300" height="460" rx="8" fill="#0d0d1a" stroke="#1a1a2e" stroke-width="1.5"/>
    <rect x="0" y="0" width="300" height="50" rx="8" fill="#0a0a1e"/>
    <rect x="0" y="40" width="300" height="10" fill="#0a0a1e"/>
    <text x="30" y="33" font-family="Courier New, monospace" font-size="15" fill="#44bbff">SIGNAL 1</text>
    <text x="150" y="90" font-family="Courier New, monospace" font-size="28" fill="#44bbff" text-anchor="middle">LEXICON</text>

    <!-- Book icon -->
    <rect x="135" y="115" width="30" height="38" rx="3" fill="none" stroke="#44bbff" stroke-opacity="0.5" stroke-width="1.5"/>
    <line x1="140" y1="124" x2="160" y2="124" stroke="#44bbff" stroke-opacity="0.3" stroke-width="1.5"/>
    <line x1="140" y1="132" x2="160" y2="132" stroke="#44bbff" stroke-opacity="0.3" stroke-width="1.5"/>
    <line x1="140" y1="140" x2="160" y2="140" stroke="#44bbff" stroke-opacity="0.3" stroke-width="1.5"/>

    <text x="150" y="200" font-family="Courier New, monospace" font-size="14" fill="#22ccaa" opacity="0.7" text-anchor="middle">FAST</text>
    <text x="150" y="225" font-family="Courier New, monospace" font-size="14" fill="#22ccaa" opacity="0.7" text-anchor="middle">FREE</text>
    <text x="150" y="250" font-family="Courier New, monospace" font-size="14" fill="#22ccaa" opacity="0.7" text-anchor="middle">TRADITIONAL</text>

    <line x1="20" y1="280" x2="280" y2="280" stroke="#1a1a2e" stroke-width="0.5" opacity="0.5"/>

    <text x="20" y="310" font-family="Courier New, monospace" font-size="12" fill="#44bbff" opacity="0.5">Financial dictionary</text>
    <text x="20" y="335" font-family="Courier New, monospace" font-size="12" fill="#44bbff" opacity="0.5">scorer. Knows words</text>
    <text x="20" y="360" font-family="Courier New, monospace" font-size="12" fill="#44bbff" opacity="0.5">like "default" and</text>
    <text x="20" y="385" font-family="Courier New, monospace" font-size="12" fill="#44bbff" opacity="0.5">"earnings beat" are</text>
    <text x="20" y="410" font-family="Courier New, monospace" font-size="12" fill="#44bbff" opacity="0.5">positive or negative.</text>

    <circle cx="20" cy="440" r="5" fill="#00ff88" opacity="0.5"/>
    <text x="36" y="445" font-family="Courier New, monospace" font-size="12" fill="#00ff88" opacity="0.5">ACTIVE - BASELINE</text>
  </g>

  <!-- Arrow 1 -->
  <g transform="translate(360, 110)">
    <line x1="10" y1="460" x2="240" y2="530" stroke="#44bbff" stroke-opacity="0.3" stroke-width="2"/>
    <polygon points="240,530 232,522 232,538" fill="#44bbff" opacity="0.3"/>
  </g>

  <!-- SIGNAL 2: CLUSTER (x:400-700) - DOMINANT, taller -->
  <g transform="translate(400, 110)">
    <rect x="0" y="-20" width="300" height="490" rx="8" fill="#0d1a0d" stroke="#00ff88" stroke-opacity="0.6" stroke-width="3"/>
    <rect x="0" y="-20" width="300" height="55" rx="8" fill="#0d1a0d"/>
    <rect x="0" y="25" width="300" height="10" fill="#0d1a0d"/>
    <text x="30" y="18" font-family="Courier New, monospace" font-size="16" fill="#00ff88">SIGNAL 2</text>
    <text x="150" y="85" font-family="Courier New, monospace" font-size="34" fill="#00ff88" text-anchor="middle" filter="url(#glow)">CLUSTER</text>

    <!-- Network nodes -->
    <circle cx="140" cy="125" r="7" fill="#00ff88" opacity="0.7"/>
    <circle cx="160" cy="125" r="7" fill="#00ff88" opacity="0.7"/>
    <circle cx="150" cy="110" r="7" fill="#00ff88" opacity="0.7"/>
    <line x1="140" y1="125" x2="160" y2="125" stroke="#00ff88" stroke-opacity="0.4" stroke-width="2"/>
    <line x1="140" y1="125" x2="150" y2="110" stroke="#00ff88" stroke-opacity="0.4" stroke-width="2"/>
    <line x1="160" y1="125" x2="150" y2="110" stroke="#00ff88" stroke-opacity="0.4" stroke-width="2"/>

    <text x="150" y="195" font-family="Courier New, monospace" font-size="15" fill="#00ff88" opacity="0.85" text-anchor="middle">ADAPTIVE</text>
    <text x="150" y="220" font-family="Courier New, monospace" font-size="15" fill="#00ff88" opacity="0.85" text-anchor="middle">LIVING</text>
    <text x="150" y="245" font-family="Courier New, monospace" font-size="15" fill="#00ff88" opacity="0.85" text-anchor="middle">REAL-TIME</text>

    <line x1="20" y1="275" x2="280" y2="275" stroke="#00ff88" stroke-opacity="0.15" stroke-width="0.5"/>

    <text x="20" y="305" font-family="Courier New, monospace" font-size="12" fill="#00ff88" opacity="0.6">Builds a living map of</text>
    <text x="20" y="330" font-family="Courier New, monospace" font-size="12" fill="#00ff88" opacity="0.6">headlines. Clusters</text>
    <text x="20" y="355" font-family="Courier New, monospace" font-size="12" fill="#00ff88" opacity="0.6">similar news together.</text>
    <text x="20" y="380" font-family="Courier New, monospace" font-size="12" fill="#00ff88" opacity="0.6">Tracks last 50 price</text>
    <text x="20" y="405" font-family="Courier New, monospace" font-size="12" fill="#00ff88" opacity="0.6">moves per cluster.</text>

    <circle cx="20" cy="440" r="6" fill="#00ff88" filter="url(#glow)"/>
    <text x="36" y="445" font-family="Courier New, monospace" font-size="12" fill="#00ff88" filter="url(#glow)">PRIMARY - CORE INTELLIGENCE</text>
  </g>

  <!-- Arrow 2 -->
  <g transform="translate(550, 110)">
    <line x1="0" y1="470" x2="0" y2="530" stroke="#00ff88" stroke-opacity="0.45" stroke-width="2.5"/>
    <polygon points="0,530 -8,522 8,522" fill="#00ff88" opacity="0.45"/>
  </g>

  <!-- SIGNAL 3: GPT (OPT) (x:740-1040) - dimmer -->
  <g transform="translate(740, 110)">
    <rect x="0" y="10" width="300" height="440" rx="8" fill="#0d0d1a" stroke="#1a1a2e" stroke-width="1.5" stroke-dasharray="6 4"/>
    <rect x="0" y="10" width="300" height="50" rx="8" fill="#0a0a1e"/>
    <rect x="0" y="50" width="300" height="10" fill="#0a0a1e"/>
    <text x="30" y="43" font-family="Courier New, monospace" font-size="15" fill="#22ccaa">SIGNAL 3</text>
    <text x="150" y="95" font-family="Courier New, monospace" font-size="24" fill="#22ccaa" text-anchor="middle">GPT (OPT)</text>

    <!-- AI chip -->
    <rect x="135" y="120" width="30" height="30" rx="4" fill="none" stroke="#22ccaa" stroke-opacity="0.35" stroke-width="1.5"/>
    <text x="150" y="141" font-family="Courier New, monospace" font-size="14" fill="#22ccaa" opacity="0.25" text-anchor="middle">AI</text>

    <text x="150" y="200" font-family="Courier New, monospace" font-size="13" fill="#22ccaa" opacity="0.45" text-anchor="middle">OPTIONAL</text>
    <text x="150" y="225" font-family="Courier New, monospace" font-size="13" fill="#22ccaa" opacity="0.45" text-anchor="middle">PLUG-IN</text>
    <text x="150" y="250" font-family="Courier New, monospace" font-size="13" fill="#22ccaa" opacity="0.45" text-anchor="middle">FLEXIBLE</text>

    <line x1="20" y1="280" x2="280" y2="280" stroke="#1a1a2e" stroke-width="0.5" opacity="0.5"/>

    <text x="20" y="310" font-family="Courier New, monospace" font-size="12" fill="#22ccaa" opacity="0.4">Optional GPT</text>
    <text x="20" y="335" font-family="Courier New, monospace" font-size="12" fill="#22ccaa" opacity="0.4">integration for full</text>
    <text x="20" y="360" font-family="Courier New, monospace" font-size="12" fill="#22ccaa" opacity="0.4">LLM horsepower.</text>
    <text x="20" y="385" font-family="Courier New, monospace" font-size="12" fill="#22ccaa" opacity="0.4">CRANE runs fine</text>
    <text x="20" y="410" font-family="Courier New, monospace" font-size="12" fill="#22ccaa" opacity="0.4">without it.</text>

    <circle cx="20" cy="440" r="5" fill="#22ccaa" opacity="0.35"/>
    <text x="36" y="445" font-family="Courier New, monospace" font-size="12" fill="#22ccaa" opacity="0.35">STANDBY - OPTIONAL</text>
  </g>

  <!-- Arrow 3 -->
  <g transform="translate(890, 110)">
    <line x1="-10" y1="450" x2="-240" y2="530" stroke="#22ccaa" stroke-opacity="0.25" stroke-width="2"/>
    <polygon points="-240,530 -232,522 -232,538" fill="#22ccaa" opacity="0.25"/>
  </g>

  <!-- ===== ENSEMBLE OUTPUT BOX ===== -->
  <g transform="translate(230, 640)">
    <!-- Glow ring -->
    <rect x="-10" y="-10" width="620" height="90" rx="12" fill="none" stroke="#00ff88" stroke-opacity="0.08" stroke-width="3"/>
    <rect x="0" y="0" width="600" height="70" rx="8" fill="#0d1a0d" stroke="#00ff88" stroke-opacity="0.7" stroke-width="3"/>
    <rect x="0" y="0" width="600" height="70" rx="8" fill="#0d1a0d" stroke="#00ff88" stroke-width="2.5" opacity="0.95"/>
    <text x="300" y="44" font-family="Courier New, monospace" font-size="32" fill="#00ff88" text-anchor="middle" filter="url(#glowStrong)">ENSEMBLE</text>
  </g>

  <!-- Bottom annotation -->
  <g transform="translate(60, 760)">
    <rect x="0" y="0" width="1020" height="55" rx="6" fill="#050a10" stroke="#44bbff" stroke-width="0.5" opacity="0.4"/>
    <text x="20" y="22" font-family="Courier New, monospace" font-size="12" fill="#44bbff" opacity="0.5">$ ./crane --pipeline --signals 1,2,3</text>
    <text x="20" y="42" font-family="Courier New, monospace" font-size="12" fill="#22ccaa" opacity="0.6">$ Three parallel signals converge into a unified directional prediction.</text>
  </g>

  <g transform="translate(60, 840)">
    <text x="0" y="15" font-family="Courier New, monospace" font-size="12" fill="#44bbff" opacity="0.4">$ Lexicon provides speed. Clusters provide adaptability. GPT provides optional depth. Together: the ensemble.</text>
  </g>

  <!-- Bottom status bar -->
  <rect x="0" y="1050" width="1920" height="30" fill="#0d0d1a" stroke="#1a1a2e" stroke-width="1"/>
  <text x="20" y="1068" font-family="Courier New, monospace" font-size="11" fill="#44bbff" opacity="0.7">CRANE // CLUSTER-REACTIVE ADAPTIVE NEWS ENSEMBLE</text>
  <text x="1860" y="1068" text-anchor="end" font-family="Courier New, monospace" font-size="11" fill="#44bbff" opacity="0.7">1920x1080 // 60FPS</text>
</svg>
